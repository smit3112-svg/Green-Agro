services:
  - type: web
    name: green-agro-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false       # Set this manually in the Render dashboard
      - key: DB_NAME
        value: green_agro
